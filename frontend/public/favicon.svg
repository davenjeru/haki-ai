<svg width="220" height="320" viewBox="0 0 220 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Green gradient (matches your UI) -->
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2f6f57"/>
      <stop offset="100%" stop-color="#163d2e"/>
    </linearGradient>

    <!-- Accent highlight -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7fd1b9"/>
      <stop offset="100%" stop-color="#2f6f57"/>
    </linearGradient>

    <!-- Subtle glow -->
    <filter id="softGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect x="75" y="270" width="70" height="10" rx="5" fill="url(#green)" filter="url(#softGlow)"/>
  <rect x="95" y="230" width="30" height="40" rx="6" fill="url(#green)"/>

  <!-- Vertical pole -->
  <rect x="105" y="70" width="10" height="160" rx="5" fill="url(#green)"/>

  <!-- Top beam -->
  <rect x="45" y="60" width="130" height="8" rx="4" fill="url(#accent)"/>

  <!-- Center node -->
  <circle cx="110" cy="64" r="6" fill="#7fd1b9"/>

  <!-- Left chains -->
  <line x1="65" y1="64" x2="55" y2="120" stroke="#7fd1b9" stroke-width="2"/>
  <line x1="85" y1="64" x2="95" y2="120" stroke="#7fd1b9" stroke-width="2"/>

  <!-- Right chains -->
  <line x1="135" y1="64" x2="125" y2="120" stroke="#7fd1b9" stroke-width="2"/>
  <line x1="155" y1="64" x2="165" y2="120" stroke="#7fd1b9" stroke-width="2"/>

  <!-- Left scale -->
  <path d="M45 120 Q75 160 105 120" fill="none" stroke="url(#accent)" stroke-width="3"/>
  <ellipse cx="75" cy="160" rx="26" ry="7" fill="#2f6f57"/>

  <!-- Right scale -->
  <path d="M115 120 Q145 160 175 120" fill="none" stroke="url(#accent)" stroke-width="3"/>
  <ellipse cx="145" cy="160" rx="26" ry="7" fill="#2f6f57"/>

</svg>