name: CI

# Runs on every PR. Keeps Haki AI demoable:
#   - backend unit tests (fast, no AWS)
#   - frontend typecheck + build
#   - pipeline typecheck + unit tests
#   - terraform validate for infra
#
# The full evaluation harness (RAGAS + LLM-judge) runs on the nightly
# schedule — see eval-nightly.yml — because it needs Bedrock credentials
# and a live KB.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync deps
        working-directory: backend
        run: uv sync

      - name: Unit tests
        working-directory: backend
        run: uv run python -m unittest discover -s tests -p 'test_unit.py' -v

  frontend:
    name: Frontend (Vite + TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: Typecheck
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build
        working-directory: frontend
        run: npm run build

  pipeline:
    name: Pipeline (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: pipeline/package-lock.json

      - name: Install
        working-directory: pipeline
        run: npm ci --prefer-offline --no-audit

      - name: Typecheck
        working-directory: pipeline
        run: npm run typecheck

      - name: Test
        working-directory: pipeline
        run: npm test

  infra:
    name: Terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      - name: Format check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        working-directory: infra
        run: terraform init -backend=false

      - name: Validate
        working-directory: infra
        run: terraform validate

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        working-directory: frontend
        run: npm ci --prefer-offline --no-audit

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: pw-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            pw-${{ runner.os }}-

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        working-directory: frontend
        env:
          # Publishable key must be provided so ClerkProvider can mount. Use a
          # repo/organization Variable (browser-safe value).
          VITE_CLERK_PUBLISHABLE_KEY: ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          # Optional: when these secrets are present, the signed-in specs run
          # against a real Clerk test instance. Otherwise they're skipped.
          CLERK_PUBLISHABLE_KEY:    ${{ vars.VITE_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY:         ${{ secrets.CLERK_SECRET_KEY }}
          E2E_CLERK_USER_USERNAME:  ${{ secrets.E2E_CLERK_USER_USERNAME }}
          E2E_CLERK_USER_PASSWORD:  ${{ secrets.E2E_CLERK_USER_PASSWORD }}
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/e2e/playwright-report
          retention-days: 7

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: frontend/e2e/test-results
          retention-days: 7
